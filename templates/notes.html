<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Notes — Manage and browse your study notes">
  <title>Notes — TaskFlow</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">
  <link rel="stylesheet" href="/static/css/notes.css">
</head>
<body>
  <div class="notes-page">
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg border-bottom mb-4">
      <div class="container-fluid px-4">
        <a class="navbar-brand fw-bold" href="#">📝 Notes</a>
        
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
          <div class="d-flex align-items-center gap-3">
            <span class="text-secondary small fw-bold" id="notes-user-name"></span>
            <a href="/comfort-zone" class="btn btn-outline-info btn-sm fw-bold" id="back-to-cz">🧘 Comfort Zone</a>
            <a href="/dashboard" class="btn btn-outline-secondary btn-sm" id="back-to-dashboard">← Dashboard</a>
            <button class="btn btn-sm btn-outline-secondary theme-toggle-btn">🌓</button>
          </div>
        </div>
      </div>
    </nav>

    <!-- Main Content -->
    <div class="container pb-5">
      <div class="row justify-content-center">
        <div class="col-lg-10">
          <div id="notes-full-container"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast Container -->
  <div class="toast-container position-fixed bottom-0 end-0 p-3" id="cz-toast-container"></div>

  <!-- Note Delete Confirm Modal -->
  <div class="modal fade" id="cz-note-confirm-modal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content text-center p-4">
        <div class="modal-body">
          <div class="display-1 mb-3">⚠️</div>
          <h3 class="fw-bold mb-2">Delete Note?</h3>
          <p class="text-muted mb-4">Are you sure you want to delete this note? This action cannot be undone.</p>
          <div class="d-flex justify-content-center gap-2 flex-wrap">
             <button class="btn btn-danger fw-bold px-4" id="cz-note-confirm-yes">Yes, Delete</button>
             <button class="btn btn-secondary fw-bold px-4" id="cz-note-confirm-no" data-bs-dismiss="modal">Cancel</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/theme.js"></script>
  <script src="/static/js/state.js"></script>
  <script src="/static/js/api.js"></script>
  <script src="/static/js/notes_editor.js"></script>
  <script>
    (() => {
      "use strict";

      // Session guard
      const session = State.getSession();
      if (!session || !session.user_id) {
        window.location.href = "/";
        return;
      }

      // Set user name
      const userEl = document.getElementById("notes-user-name");
      if (userEl) userEl.textContent = session.username;

      // Initialize notes editor in full mode
      NotesEditor.init("#notes-full-container", session.user_id, { compact: false });
    })();
  </script>
</body>
</html>
