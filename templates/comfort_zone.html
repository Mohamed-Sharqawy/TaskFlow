<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Comfort Zone — Pomodoro timer with video player for focused productivity">
  <title>Comfort Zone — TaskFlow</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">
  <link rel="stylesheet" href="/static/css/comfort_zone.css">
</head>
<body>
  <div class="cz-page">
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg border-bottom mb-4">
      <div class="container-fluid px-4">
        <a class="navbar-brand fw-bold" href="#">🧘 Comfort Zone</a>
        
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
          <div class="d-flex align-items-center gap-3">
            <span class="text-secondary small fw-bold" id="cz-user-name"></span>
            <a href="/notes" class="btn btn-outline-success btn-sm fw-bold" id="goto-notes">📝 Notes</a>
            <a href="/dashboard" class="btn btn-outline-secondary btn-sm" id="back-to-dashboard">← Dashboard</a>
            <button class="btn btn-sm btn-outline-secondary theme-toggle-btn">🌓</button>
          </div>
        </div>
      </div>
    </nav>

    <!-- Main Content -->
    <div class="container pb-5">
      <div class="row g-4">

        <!-- Left Column -->
        <div class="col-lg-6 d-flex flex-column gap-4">
          
          <!-- ===== TIMER CARD ===== -->
          <div class="card shadow-sm border-0 cz-timer-card" id="cz-timer-card" data-mode="work">
            <div class="card-body p-4 d-flex flex-column align-items-center text-center">
              <h5 class="card-title text-uppercase text-muted fw-bold mb-4 w-100 text-start fs-6"><span class="me-2">⏱</span> Pomodoro Timer</h5>

              <!-- SVG Progress Ring (Kept as requested) -->
              <div class="cz-timer-ring-wrapper">
                <svg class="cz-timer-ring" viewBox="0 0 220 220">
                  <defs>
                    <linearGradient id="ring-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                      <stop offset="0%" stop-color="#0d6efd" />
                      <stop offset="100%" stop-color="#198754" />
                    </linearGradient>
                  </defs>
                  <circle class="ring-bg" cx="110" cy="110" r="96" />
                  <circle class="ring-progress" id="ring-progress" cx="110" cy="110" r="96" />
                </svg>
                <div class="cz-timer-center">
                  <div class="cz-timer-display" id="cz-timer-display">25:00</div>
                  <div class="cz-timer-mode" id="cz-timer-mode">Ready</div>
                </div>
              </div>

              <div class="text-muted small mb-4 fw-medium" id="cz-timer-session">Configure settings below</div>

              <!-- Timer Controls -->
              <div class="d-flex gap-2 justify-content-center w-100 cz-timer-controls">
                <button class="btn btn-primary fw-bold px-4" id="cz-btn-start">▶ Start</button>
                <button class="btn btn-warning fw-bold px-4" id="cz-btn-pause" style="display:none">⏸ Pause</button>
                <button class="btn btn-outline-danger fw-bold px-4" id="cz-btn-reset" style="display:none">↺ Reset</button>
              </div>
            </div>
          </div>

          <!-- ===== NOTES CARD ===== -->
          <div class="card shadow-sm border-0 flex-grow-1" id="cz-notes-card">
            <div class="card-body p-4 d-flex flex-column">
              <h5 class="card-title text-uppercase text-muted fw-bold mb-3 fs-6"><span class="me-2">📝</span> Notes</h5>
              <div id="cz-notes-container" class="flex-grow-1"></div>
            </div>
          </div>

        </div>

        <!-- Right Column -->
        <div class="col-lg-6 d-flex flex-column gap-4">
          
          <!-- ===== VIDEO CARD ===== -->
          <div class="card shadow-sm border-0" id="cz-video-card">
            <div class="card-body p-4">
              <h5 class="card-title text-uppercase text-muted fw-bold mb-3 fs-6"><span class="me-2">🎥</span> Video Player</h5>

              <!-- URL Input -->
              <div class="input-group mb-3">
                <input type="text" class="form-control" id="cz-video-url" placeholder="Paste video URL (.mp4 or YouTube)...">
                <button class="btn btn-outline-primary fw-bold" id="cz-btn-load-video">Load</button>
              </div>

              <!-- Video Wrapper -->
              <div class="cz-video-wrapper bg-black rounded overflow-hidden border mb-3" id="cz-video-wrapper">
                <div class="cz-video-placeholder d-flex flex-column align-items-center justify-content-center h-100 text-muted p-5 text-center">
                  <span class="fs-1 mb-2 opacity-50">🎬</span>
                  <span class="small">Enter a video URL above to get started</span>
                </div>
              </div>

              <!-- Video Controls -->
              <div class="d-flex justify-content-center align-items-center gap-2 mb-2 cz-video-controls">
                <button class="btn btn-outline-secondary rounded-circle p-2 lh-1" style="width: 40px; height: 40px;" id="cz-btn-backward" title="Backward 10s">⏪</button>
                <button class="btn btn-primary rounded-circle p-2 lh-1 fs-5 shadow-sm" style="width: 50px; height: 50px;" id="cz-btn-play-pause" title="Play / Pause">▶</button>
                <button class="btn btn-outline-secondary rounded-circle p-2 lh-1" style="width: 40px; height: 40px;" id="cz-btn-forward" title="Forward 10s">⏩</button>
                <button class="btn btn-outline-secondary rounded-circle p-2 lh-1 ms-2" style="width: 40px; height: 40px;" id="cz-btn-fullscreen" title="Fullscreen">⛶</button>
              </div>

              <!-- Video Status -->
              <div class="d-flex justify-content-between text-muted small mt-2" id="cz-video-status"></div>
            </div>
          </div>

          <!-- ===== SETTINGS CARD ===== -->
          <div class="card shadow-sm border-0" id="cz-settings-card">
            <div class="card-body p-4">
              <h5 class="card-title text-uppercase text-muted fw-bold mb-3 fs-6"><span class="me-2">⚙</span> Session Settings</h5>
              
              <div class="row g-3">
                <div class="col-sm-4">
                  <label for="cz-input-work" class="form-label text-uppercase text-secondary fw-bold" style="font-size: 0.75rem;">Work Duration</label>
                  <input type="number" class="form-control text-center fw-bold" id="cz-input-work" value="25" min="1" max="120">
                  <div class="form-text" style="font-size: 0.7rem;">minutes</div>
                </div>
                <div class="col-sm-4">
                  <label for="cz-input-break" class="form-label text-uppercase text-secondary fw-bold" style="font-size: 0.75rem;">Break Duration</label>
                  <input type="number" class="form-control text-center fw-bold" id="cz-input-break" value="5" min="1" max="60">
                  <div class="form-text" style="font-size: 0.7rem;">minutes</div>
                </div>
                <div class="col-sm-4">
                  <label for="cz-input-sessions" class="form-label text-uppercase text-secondary fw-bold" style="font-size: 0.75rem;">Sessions</label>
                  <input type="number" class="form-control text-center fw-bold" id="cz-input-sessions" value="4" min="1" max="20">
                  <div class="form-text" style="font-size: 0.7rem;">total</div>
                </div>
              </div>

            </div>
          </div>

        </div>
      </div>
    </div><!-- /cz-container -->
  </div><!-- /cz-page -->

  <!-- Popup Modal Overlay (Bootstrap Modal) -->
  <div class="modal fade" id="cz-popup-modal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content text-center p-4">
        <div class="modal-body">
          <div class="display-1 mb-3" id="cz-popup-icon">🎉</div>
          <h3 class="fw-bold mb-2" id="cz-popup-title">Session Complete</h3>
          <p class="text-muted mb-4" id="cz-popup-subtitle"></p>
          <div class="d-flex justify-content-center gap-2 flex-wrap" id="cz-popup-actions"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast Container -->
  <div class="toast-container position-fixed bottom-0 end-0 p-3" id="cz-toast-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/theme.js"></script>
  <script src="/static/js/state.js"></script>
  <script src="/static/js/api.js"></script>
  <script src="/static/js/pomodoro.js"></script>
  <script src="/static/js/video_player.js"></script>
  <script src="/static/js/notes_editor.js"></script>
  <script src="/static/js/comfort_zone_controller.js"></script>
</body>
</html>
