<!DOCTYPE html>
<html lang = "en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, intial-scale=1.0">
        <meta name="description" content="Create a new TaskFlow account">
        <title>Register - TaskFlow</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="/static/css/style.css">
    </head>
    <body class="d-flex align-items-center justify-content-center min-vh-100">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-6 col-lg-4">
                    <div class="card shadow-sm border-0">
                        <div class="card-body p-4">
                            <div class="text-center mb-4">
                                {% comment %} <span class="fs-1"></span> {% endcomment %}
                                <h1 class="h3 fw-bold mt-2">Create Account</h1>
                                <p class="text-muted">Join TaskFlow and stay organized</p>
                            </div>

                            <div id="error-box" class="alert alert-danger d-none" role="alert"></div>

                            <form id="register-form" autocomplete="off">
                                <div class="mb-3">
                                    <label for="username" class="form-label fw-bold text-uppercase" style="font-size: 0.8rem;">Username</label>
                                    <input id="username" class="form-control" type="text" placeholder="Choose a username (min 3 chars)" required>
                                </div>
                                <div class="mb-3">
                                    <label for="password" class="form-label fw-bold text-uppercase" style="font-size: 0.8rem;">Password</label>
                                    <input id="password" class="form-control" type="password" placeholder="Choose a password (min 4 chars)" required>
                                </div>
                                <button type="submit" class="btn btn-primary w-100 fw-bold" id="register-btn">Create Account</button>
                            </form>

                            <div class="text-center mt-4 text-muted small">
                                Already have an account? <a href="/" class="text-decoration-none">Sign in</a>
                            </div>

                            <div class="text-center mt-3">
                <button class="btn btn-sm btn-outline-secondary theme-toggle-btn"> Toggle Mode </button>
            </div>
        </div>
        </div>
        </div>
    </div>
</div>

    <script src="/static/js/theme.js"></script>
    <script src="/static/js/state.js"></script>
    <script src="/static/js/api.js"></script>
    <script src="/static/js/auth.js"></script>
</body>
</html>
