<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="TaskFlow Dashboard — manage your cards and tasks">
  <title>Dashboard — TaskFlow</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <div class="dashboard" id="dashboard">
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg border-bottom mb-4">
      <div class="container-fluid px-4">
        <a class="navbar-brand fw-bold" href="#">📋 TaskFlow</a>
        
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
          <div class="d-flex align-items-center gap-3">
            <div class="user-info d-flex align-items-center gap-2">
              <div class="user-avatar" id="user-avatar"></div>
              <span class="user-name fw-bold" id="user-name"></span>
            </div>
            <a href="/comfort-zone" class="btn btn-outline-info btn-sm fw-bold" id="comfort-zone-link"> Comfort Zone </a>
            <button class="btn btn-outline-danger btn-sm" id="logout-btn">Logout</button>
            <button class="btn btn-sm btn-outline-secondary theme-toggle-btn">🌓</button>
          </div>
        </div>
      </div>
    </nav>

    
    <div class="container-fluid px-4">
      
      
      <div class="row mb-4 align-items-center gy-3">
        <div class="col-lg-6 d-flex flex-wrap gap-2">
          <div class="input-group" style="max-width: 250px;">
            <span class="input-group-text bg-transparent">🔍</span>
            <input type="text" class="form-control" id="search-input" placeholder="Search tasks...">
          </div>
          <select class="form-select" id="filter-select" style="width: auto;">
            <option value="all">All Cards</option>
            <option value="completed">Has Completed</option>
            <option value="pending">Has Pending</option>
          </select>
          <select class="form-select" id="sort-select" style="width: auto;">
            <option value="newest">Newest First</option>
            <option value="oldest">Oldest First</option>
            <option value="title">Title A-Z</option>
          </select>
        </div>
        
        
        <div class="col-lg-6 d-flex flex-wrap justify-content-lg-end gap-2" id="stats-bar">
          <span class="badge border text-body bg-transparent p-2">Cards <span class="text-primary fs-6 ms-1" id="stat-cards">0</span></span>
          <span class="badge border text-body bg-transparent p-2">Tasks <span class="text-primary fs-6 ms-1" id="stat-tasks">0</span></span>
          <span class="badge border text-body bg-transparent p-2">Done <span class="text-success fs-6 ms-1" id="stat-done">0</span></span>
          <span class="badge border text-body bg-transparent p-2">Pending <span class="text-warning fs-6 ms-1" id="stat-pending">0</span></span>
        </div>
      </div>

      <div class="row mb-4">
        <div class="col-md-6 col-lg-4">
          <div class="input-group">
            <input type="text" class="form-control" id="new-card-input" placeholder="New card title...">
            <button class="btn btn-primary fw-bold" id="add-card-btn">+ Add Card</button>
          </div>
        </div>
      </div>

      
      <div class="mb-4">
        <button class="btn btn-sm btn-outline-danger" id="delete-all-btn">🗑 Delete All Cards</button>
      </div>

      
      <div class="row g-4" id="card-grid"></div>

    </div>
  </div>

  
  <div class="toast-container position-fixed bottom-0 end-0 p-3" id="toast-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/theme.js"></script>
  <script src="/static/js/state.js"></script>
  <script src="/static/js/api.js"></script>
  <script src="/static/js/app.js"></script>
</body>
</html>
